<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Candela González</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { scroll-behavior: smooth; }
        html { overflow-y: scroll; }
        body { background: linear-gradient(135deg, #fdf8f3 0%, #f5ede4 100%); }
        a { transition: all 0.3s ease; }
    </style>
</head>
<body class="text-stone-900 antialiased">
    <!-- HEADER -->
    <header class="bg-gradient-to-r from-stone-800 via-amber-900 to-stone-900 text-white py-6 px-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <span style="font-size:1.5rem;">←</span>
                <span class="font-light">Atrás</span>
            </a>
            <h1 class="text-2xl font-light">Blog</h1>
            <div style="width:60px;"></div>
        </div>
    </header>

    <!-- HERO -->
    <section class="py-16 px-4 text-center">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-light mb-4 text-stone-900">
                <span id="blog-titulo">Pensamientos que Inspiran</span>
            </h2>
            <p class="text-lg text-stone-600 font-light" id="blog-subtitulo">
                Reflexiones y artículos sobre bienestar psicológico
            </p>
        </div>
    </section>

    <!-- ARTÍCULOS GRID -->
    <section class="max-w-6xl mx-auto px-4 pb-20">
        <div id="articulos-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Se renderiza por JavaScript -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-gradient-to-r from-stone-900 via-amber-950 to-stone-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-700 to-stone-700 flex items-center justify-center">
                        <span class="text-white font-bold">C</span>
                    </div>
                    <div>
                        <p class="font-semibold text-white text-sm">Candela Gonzalez</p>
                        <p class="text-amber-400/80 text-xs">Psicóloga Profesional</p>
                    </div>
                </div>
                <p class="text-stone-400 text-sm text-center">
                    © 2024 Candela Gonzalez - Psicóloga. Todos los derechos reservados.
                </p>
            </div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        // Renderizar artículos
        function renderBlog() {
            const db = getDB();
            const container = document.getElementById('articulos-grid');
            container.innerHTML = '';

            if (!db.articulos || db.articulos.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-12 text-stone-500">No hay artículos publicados aún</div>';
                return;
            }

            // Mostrar todos los artículos en orden (nuevos primero)
            const articulos = [...db.articulos].reverse();
            
            articulos.forEach(art => {
                const card = document.createElement('a');
                card.href = `article.html?id=${art.id}`;
                card.className = 'group bg-white rounded-2xl shadow-md hover:shadow-xl overflow-hidden transition-all duration-300 hover:scale-105';
                card.innerHTML = `
                    <!-- Header with image or gradient -->
                    <div class="relative h-40 bg-gradient-to-br ${art.color_desde || 'from-green-600'} ${art.color_via || 'via-green-700'} ${art.color_hasta || 'to-stone-700'} overflow-hidden">
                        ${art.imagen_portada ? `<img src="${art.imagen_portada}" alt="${art.titulo}" class="w-full h-full object-cover">` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
                    </div>
                    
                    <!-- Content -->
                    <div class="p-4">
                        <h3 class="font-semibold text-stone-900 text-base group-hover:text-amber-700 transition mb-1">
                            ${art.titulo || 'Sin título'}
                        </h3>
                        <p class="text-xs text-stone-500 mb-3">${art.fecha || ''}</p>

                        <!-- Descripción -->
                        <p class="text-stone-600 text-sm mb-3 line-clamp-2">
                            ${art.descripcion || ''}
                        </p>

                        <!-- Tags -->
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${art.tag1 ? `<span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-medium">${art.tag1}</span>` : ''}
                            ${art.tag2 ? `<span class="text-xs bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-medium">${art.tag2}</span>` : ''}
                        </div>

                        <!-- Button -->
                        <button class="w-full py-2 px-3 rounded-lg font-semibold text-white text-xs group-hover:shadow-lg transition ${
                            `bg-gradient-to-r ${art.color_boton || 'from-green-700 to-stone-600'}`
                        }">
                            ${art.boton_texto || 'Leer más'} →
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Cargar frases
            const frases = db.frases || {};
            document.getElementById('blog-titulo').textContent = frases.blog_titulo || 'Pensamientos que Inspiran';
            document.getElementById('blog-subtitulo').textContent = frases.blog_subtitulo || 'Reflexiones y artículos sobre bienestar psicológico';
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderBlog();
        });
    </script>
</body>
</html>
